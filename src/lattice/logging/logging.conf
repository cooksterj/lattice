[loggers]
keys=root,lattice,lattice_executor,lattice_web

[handlers]
keys=consoleHandler

[formatters]
keys=standard,detailed

[logger_root]
level=WARNING
handlers=consoleHandler

[logger_lattice]
level=INFO
handlers=consoleHandler
qualname=lattice
propagate=0

[logger_lattice_executor]
level=INFO
handlers=consoleHandler
qualname=lattice.executor
propagate=0

[logger_lattice_web]
level=INFO
handlers=consoleHandler
qualname=lattice.web
propagate=0

[handler_consoleHandler]
class=StreamHandler
level=DEBUG
formatter=standard
args=(sys.stderr,)

# Uncomment the following to enable file logging:
# [handler_fileHandler]
# class=FileHandler
# level=DEBUG
# formatter=detailed
# args=('lattice.log', 'a')

[formatter_standard]
format=%(asctime)s - %(name)s - %(levelname)s - %(message)s
datefmt=%H:%M:%S

[formatter_detailed]
format=%(asctime)s - %(name)s - %(levelname)s - %(filename)s:%(lineno)d - %(message)s
datefmt=%Y-%m-%d %H:%M:%S
