{% extends "base.html" %}
{% block title %}{{ group_name }} // LATTICE{% endblock %}
{% block head_extra %}
<script src="https://d3js.org/d3.v7.min.js"></script>
{% endblock %}
{% block content %}
<div class="flex h-screen relative z-10">
    <!-- Main Graph Area -->
    <div class="flex-1 relative">
        <!-- Header -->
        <header class="header absolute top-0 left-0 right-0 z-10 p-4 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <div class="logo-container">
                    <div class="logo-glow"></div>
                    <svg class="logo-icon" viewBox="0 0 32 32" fill="none">
                        <rect x="2" y="2" width="12" height="12" stroke="currentColor" stroke-width="2"/>
                        <rect x="18" y="2" width="12" height="12" stroke="currentColor" stroke-width="2"/>
                        <rect x="2" y="18" width="12" height="12" stroke="currentColor" stroke-width="2"/>
                        <rect x="18" y="18" width="12" height="12" stroke="currentColor" stroke-width="2"/>
                        <line x1="14" y1="8" x2="18" y2="8" stroke="currentColor" stroke-width="2"/>
                        <line x1="8" y1="14" x2="8" y2="18" stroke="currentColor" stroke-width="2"/>
                        <line x1="24" y1="14" x2="24" y2="18" stroke="currentColor" stroke-width="2"/>
                        <line x1="14" y1="24" x2="18" y2="24" stroke="currentColor" stroke-width="2"/>
                    </svg>
                </div>
                <div class="title-container">
                    <h1 class="title-main">LATTICE</h1>
                    <div class="title-sub">GROUP // {{ group_name | replace("_", " ") | upper }}</div>
                </div>
            </div>
            <div class="flex items-center gap-3">
                <nav class="flex items-center gap-1">
                    <a href="/" class="nav-link">HOME</a>
                    <a href="/pipeline" class="nav-link">PIPELINE</a>
                </nav>
                <div class="header-divider"></div>
                <div class="status-display">
                    <span class="status-label">NODES:</span>
                    <span id="asset-count" class="status-value">---</span>
                </div>
                <div class="header-divider"></div>
                <button id="relayout-btn" class="header-btn" title="Re-run layout">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                              d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
                    </svg>
                </button>
                <button id="theme-toggle" class="header-btn" title="Toggle theme">
                    <svg class="w-5 h-5 sun hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                              d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
                    </svg>
                    <svg class="w-5 h-5 moon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                              d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
                    </svg>
                </button>
            </div>
        </header>

        <!-- Graph Container -->
        <div id="group-graph-container" class="w-full h-full" data-group-name="{{ group_name }}">
            <svg id="group-graph"></svg>
        </div>

        <!-- Loading Overlay -->
        <div id="loading" class="loading-overlay absolute inset-0 flex items-center justify-center">
            <div class="loader-container">
                <div class="loader-ring"></div>
                <div class="loader-ring delay-1"></div>
                <div class="loader-ring delay-2"></div>
                <div class="loader-text">INITIALIZING</div>
            </div>
        </div>
    </div>
</div>

<!-- Tooltip -->
<div id="tooltip" class="tooltip fixed z-50 px-4 py-3 pointer-events-none opacity-0 transition-opacity duration-150">
</div>
{% endblock %}
{% block scripts %}
<script src="/static/js/group_graph.js?v=2"></script>
{% endblock %}
