name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-matrix:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run linter
        run: uv run ruff check src tests

      - name: Run type checker
        run: uv run mypy src

      - name: Run tests
        run: uv run pytest --tb=short --junitxml=report.xml --cov=src/lattice --cov-report=term-missing | tee coverage-output.txt

      - name: Test & Coverage Summary
        if: always()
        run: python .github/scripts/test_summary.py

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Check formatting
        run: uv run ruff format --check src tests

  test:
    runs-on: ubuntu-latest
    needs: [test-matrix, lint]
    if: always()
    steps:
      - run: |
          if [[ "${{ needs.test-matrix.result }}" != "success" || "${{ needs.lint.result }}" != "success" ]]; then
            exit 1
          fi
